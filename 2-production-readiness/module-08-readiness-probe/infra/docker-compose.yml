services:
  postgres:
    image: postgres:16-alpine
    container_name: linkops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d linkops"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linkops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: linkops-api:latest
    container_name: linkops-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - CORS_ORIGIN=http://localhost:3000
      - LOG_LEVEL=info
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/linkops
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=this-is-a-super-secure-32-byte-jwt-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

